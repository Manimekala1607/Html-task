<html>
<head>
<title>Student Registration Form</title>
</head>

<body bgcolor="lightcyan">

<center>

<h2><u>STUDENT REGISTRATION FORM</u></h2>

<form>

<table border="1" cellpadding="8" cellspacing="5">

<tr>
<td>First Name</td>
<td><input type="text" name="fname"></td>
</tr>

<tr>
<td>Last Name</td>
<td><input type="text" name="lname"></td>
</tr>

<tr>
<td>Register Number</td>
<td><input type="text" name="regno"></td>
</tr>

<tr>
<td>Password</td>
<td><input type="password" name="password"></td>
</tr>

<tr>
<td>Email ID</td>
<td><input type="email" name="email"></td>
</tr>

<tr>
<td>Mobile Number</td>
<td><input type="tel" name="mobile"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td><input type="date" name="dob"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female
<input type="radio" name="gender">Other
</td>
</tr>

<tr>
<td>Department</td>
<td>
<select>
<option>--Select Department--</option>
<option>B.Sc Computer Science</option>
<option>BCA</option>
<option>B.Com</option>
<option>BBA</option>
<option>B.Sc Mathematics</option>
<option>B.Sc Physics</option>
</select>
</td>
</tr>

<tr>
<td>Year</td>
<td>
<select>
<option>--Select Year--</option>
<option>I Year</option>
<option>II Year</option>
<option>III Year</option>
</select>
</td>
</tr>

<tr>
<td>Address</td>
<td>
<textarea rows="4" cols="25"></textarea>
</td>
</tr>

<tr>
<td>Languages Known</td>
<td>
<input type="checkbox">Tamil
<input type="checkbox">English
<input type="checkbox">Hindi
</td>
</tr>

<tr>
<td>Upload Photo</td>
<td><input type="file"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
<input type="button" value="Preview">
</td>
</tr>

</table>

</form>

</center>

</body>
</html>
